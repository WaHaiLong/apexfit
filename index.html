<!DOCTYPE html>
<html lang="zh"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" type="image/png" href="apple-touch-icon.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>APEXFIT — 肌肉图谱</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#08080f;font-family:'Inter',sans-serif;overflow:hidden}
:root{--acc:#ff5722;--acc2:#7c4dff;--bg:#08080f;--bg2:#0f0f1c;--bg3:#171728;--t1:#f5f0ea;--t2:#666480;--bd:rgba(255,255,255,0.07)}
.app{display:flex;flex-direction:column;height:100vh}

/* HEADER */
.top{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;border-bottom:1px solid var(--bd);background:rgba(8,8,15,.96);flex-shrink:0;z-index:10;gap:12px}
.logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;color:var(--acc)}
.logo em{color:var(--t1);font-style:normal}
.vtabs{display:flex;gap:3px;background:var(--bg3);border-radius:20px;padding:3px;border:1px solid var(--bd)}
.vtab{padding:4px 16px;border-radius:17px;border:none;background:transparent;color:var(--t2);font-size:10px;font-weight:700;cursor:pointer;letter-spacing:1px;text-transform:uppercase;transition:all .2s}
.vtab.on{background:var(--acc);color:#fff;box-shadow:0 2px 10px rgba(255,87,34,.4)}
.badge{font-size:10px;font-weight:600;color:var(--t2);background:var(--bg3);border:1px solid var(--bd);border-radius:20px;padding:3px 12px;white-space:nowrap}

/* MAIN */
.main{display:flex;flex:1;overflow:hidden}

/* BODY VIEW */
.bview{display:flex;flex:1;overflow:hidden}
.stage{flex:1;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;background:radial-gradient(ellipse 65% 75% at 50% 45%,#110e28 0%,#08080f 72%)}
.grid-bg{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.018) 1px,transparent 1px);background-size:36px 36px;pointer-events:none}
.glow-floor{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);width:200px;height:50px;background:radial-gradient(ellipse,rgba(255,87,34,.08) 0%,transparent 70%);pointer-events:none;transition:background .4s}

/* SVG */
#bodySvg{position:relative;z-index:2;height:calc(100% - 90px);max-height:480px;width:auto}

/* Side toggle */
.side-toggle{position:absolute;bottom:22px;left:50%;transform:translateX(-50%);display:flex;gap:3px;background:var(--bg3);border-radius:20px;padding:3px;border:1px solid var(--bd);z-index:5}
.stbtn{padding:4px 18px;border-radius:17px;border:none;background:transparent;color:var(--t2);font-size:10px;font-weight:700;cursor:pointer;letter-spacing:1px;transition:all .2s}
.stbtn.on{background:rgba(255,255,255,.08);color:var(--t1)}

/* SVG muscle CSS states */
.m-base{fill:#1a1530;stroke:rgba(255,255,255,.05);stroke-width:.5}
.m-muscle{cursor:pointer;transition:fill .2s,filter .2s,opacity .2s;fill-opacity:.9}
.m-muscle[data-side="front"]{fill:#3d2514;stroke:#ff6b3588;stroke-width:.6}
.m-muscle[data-side="back"]{fill:#241840;stroke:#9c6dff66;stroke-width:.6}
.m-muscle:hover{filter:brightness(1.4)}
.m-muscle.hi[data-side="front"]{fill:#ff5722;stroke:#ff8c00;stroke-width:1;filter:drop-shadow(0 0 5px rgba(255,69,0,.75))}
.m-muscle.hi[data-side="back"]{fill:#9c6dff;stroke:#bb99ff;stroke-width:1;filter:drop-shadow(0 0 5px rgba(156,109,255,.75))}
.m-muscle.dim{fill-opacity:.25;filter:none}
.m-muscle.dim[data-side="front"]{fill:#1e1208}
.m-muscle.dim[data-side="back"]{fill:#110c22}

/* Heat mode */
#bodySvg.heat .m-base{fill:#020108}
#bodySvg.heat .m-muscle{fill:#06020f;fill-opacity:.9;stroke-opacity:.1}
#bodySvg.heat .m-muscle.hi[data-side="front"]{fill:#ff2200;filter:drop-shadow(0 0 10px rgba(255,50,0,1)) drop-shadow(0 0 20px rgba(255,100,0,.5))}
#bodySvg.heat .m-muscle.hi[data-side="back"]{fill:#7700ff;filter:drop-shadow(0 0 10px rgba(120,0,255,1)) drop-shadow(0 0 20px rgba(160,80,255,.5))}
#bodySvg.heat .m-muscle.dim{fill:#040210;fill-opacity:.7}
#bodySvg.heat{background:radial-gradient(ellipse 60% 70% at 50% 45%,#080015 0%,#020008 100%)}

/* PANEL */
.panel{width:222px;flex-shrink:0;border-left:1px solid var(--bd);display:flex;flex-direction:column;background:rgba(8,8,15,.96)}
.psec{padding:13px;border-bottom:1px solid var(--bd);flex-shrink:0}
.ptit{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t2);margin-bottom:9px}
.pills{display:flex;flex-wrap:wrap;gap:4px}
.pill{padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600;border:1px solid var(--bd);color:var(--t2);cursor:pointer;transition:all .18s}
.pill:hover{border-color:var(--acc);color:var(--acc)}
.pill.on{background:rgba(255,87,34,.15);border-color:var(--acc);color:var(--acc)}
.pill.on.sec{background:rgba(124,77,255,.15);border-color:var(--acc2);color:var(--acc2)}
.pinfo{flex:1;overflow-y:auto;padding:12px;scrollbar-width:thin;scrollbar-color:#1a1a2a transparent}
.icard{background:var(--bg2);border:1px solid var(--bd);border-radius:11px;padding:12px;margin-bottom:9px}
.icard h3{font-size:14px;font-weight:600;color:var(--t1);margin-bottom:2px}
.ien{font-size:10px;color:var(--t2);margin-bottom:8px}
.icard p{font-size:11px;color:var(--t2);line-height:1.7}
.istats{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:9px}
.ist{background:var(--bg3);border-radius:8px;padding:7px;text-align:center}
.isv{font-size:12px;font-weight:700;color:var(--acc)}
.isl{font-size:9px;color:var(--t2);margin-top:1px}
.ex{display:flex;align-items:center;gap:7px;padding:7px 8px;border-radius:8px;background:var(--bg2);border:1px solid var(--bd);margin-bottom:5px;transition:border-color .2s,transform .1s;cursor:pointer}
.ex:hover{border-color:var(--acc);transform:translateX(2px)}
.ei{width:24px;height:24px;border-radius:6px;background:rgba(255,87,34,.12);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.en2{font-size:11px;font-weight:500;color:var(--t1)}
.et{font-size:9px;color:var(--t2)}
.empty{text-align:center;padding:36px 10px;color:var(--t2);font-size:11px;line-height:2.4}
.pbot{padding:11px;border-top:1px solid var(--bd);flex-shrink:0}
.cta{width:100%;padding:10px;border-radius:10px;background:linear-gradient(135deg,#ff5722,#e64a19);border:none;color:#fff;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;opacity:0;pointer-events:none;transition:opacity .3s,transform .15s;box-shadow:0 3px 16px rgba(255,87,34,.2)}
.cta.on{opacity:1;pointer-events:all}
.cta:hover{transform:translateY(-1px);box-shadow:0 5px 20px rgba(255,87,34,.38)}

/* CARDS VIEW */
.cview{display:none;flex:1;overflow-y:auto;padding:20px;gap:0;scrollbar-width:thin;scrollbar-color:#1a1a2a transparent}
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px;align-content:start}
.mcard{background:var(--bg2);border:1px solid var(--bd);border-radius:14px;padding:16px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.mcard::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,87,34,.04) 0%,transparent 60%);opacity:0;transition:opacity .2s}
.mcard.sec::after{background:linear-gradient(135deg,rgba(124,77,255,.06) 0%,transparent 60%)}
.mcard:hover{border-color:rgba(255,87,34,.5);transform:translateY(-3px);box-shadow:0 10px 36px rgba(255,87,34,.12)}
.mcard:hover::after{opacity:1}
.mcard.sec:hover{border-color:rgba(124,77,255,.5);box-shadow:0 10px 36px rgba(124,77,255,.12)}
.mcard-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.mcard-icon{font-size:26px;line-height:1}
.mcard-tag{font-size:9px;font-weight:700;letter-spacing:1px;padding:3px 9px;border-radius:10px;background:rgba(255,87,34,.15);color:var(--acc)}
.mcard.sec .mcard-tag{background:rgba(124,77,255,.15);color:var(--acc2)}
.mcard-name{font-size:15px;font-weight:600;color:var(--t1);margin-bottom:2px}
.mcard-en{font-size:10px;color:var(--t2);margin-bottom:8px}
.mcard-desc{font-size:10px;color:var(--t2);line-height:1.6;margin-bottom:10px}
.mcard-stats{display:flex;gap:6px;margin-bottom:10px}
.mcs{flex:1;background:var(--bg3);border-radius:8px;padding:6px;text-align:center}
.mcsv{font-size:11px;font-weight:700;color:var(--acc)}
.mcard.sec .mcsv{color:var(--acc2)}
.mcsl{font-size:8px;color:var(--t2);margin-top:1px}
.mcard-exs{display:flex;flex-direction:column;gap:4px}
.mcard-ex{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--t2);padding:3px 0;border-top:1px solid var(--bd)}

/* BOTTOM */
.bot{border-top:1px solid var(--bd);padding:8px 20px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;background:rgba(8,8,15,.96)}
.bot span{font-size:10px;color:var(--t2)}
#bang{font-size:10px;font-weight:600;color:var(--acc)}
</style>
</head>
<body>

  <div class="vtabs">
    <button class="vtab on" onclick="setView('atlas')">图谱</button>

    <button class="vtab" onclick="setView('cards')">卡片</button>
  </div>
  <div class="badge" id="vlabel">交互图谱</div>
</div>

          d="M63,311 C58,334 58,358 60,371 C62,380 70,382 78,380 C86,377 88,367 87,354 C87,332 85,311 80,309 Z"/>
        <path class="m-muscle" data-g="calves" data-side="back"
          d="M100,309 C95,311 93,332 93,354 C92,367 94,377 102,380 C110,382 118,380 120,371 C122,358 122,334 117,311 Z"/>

        <!-- FOREARMS back -->
        <path class="m-muscle" data-g="forearm" data-side="back"
          d="M48,149 C41,166 40,186 42,200 C44,208 51,210 57,207 C63,204 65,193 64,177 C63,161 60,147 53,145 Z"/>
        <path class="m-muscle" data-g="forearm" data-side="back"
          d="M127,145 C120,147 117,161 116,177 C115,193 117,204 123,207 C129,210 136,208 138,200 C140,186 139,166 132,149 Z"/>

      </g><!-- /backView -->
    </svg>

    <div class="side-toggle">
      <button class="stbtn on" id="btnFront" onclick="setSide('front')">正面</button>
      <button class="stbtn" id="btnBack" onclick="setSide('back')">背面</button>
    </div>
  </div>

  <!-- INFO PANEL -->
  <div class="panel">
    <div class="psec">
      <div class="ptit">肌群选择</div>
      <div class="pills">
        <div class="pill" data-g="chest" onclick="sel('chest')">胸肌</div>
        <div class="pill" data-g="shoulders" onclick="sel('shoulders')">三角肌</div>
        <div class="pill" data-g="biceps" onclick="sel('biceps')">二头肌</div>
        <div class="pill" data-g="triceps" onclick="sel('triceps')">三头肌</div>
        <div class="pill" data-g="abs" onclick="sel('abs')">腹肌</div>
        <div class="pill sec" data-g="lats" onclick="sel('lats')">背阔肌</div>
        <div class="pill sec" data-g="quads" onclick="sel('quads')">腿部</div>
        <div class="pill sec" data-g="glutes" onclick="sel('glutes')">臀肌</div>
        <div class="pill" data-g="calves" onclick="sel('calves')">小腿</div>
        <div class="pill" data-g="forearm" onclick="sel('forearm')">前臂</div>
      </div>
    </div>
    <div class="pinfo" id="pinfo">
      <div class="empty">←<br>点击人体图上的肌肉<br>或左侧选择肌群<br>查看训练详情</div>
    </div>
    <div class="pbot"><button class="cta" id="cta" onclick="go()">生成训练计划 →</button></div>
  </div>
</div><!-- /bview -->

<!-- CARDS VIEW -->
<div class="cview" id="cview">
  <div class="cgrid" id="cgrid"></div>
</div>

</div><!-- /main -->

<div class="bot">
  <span id="botLeft">点击人体图选择肌群 · 切换正面/背面 · 三种展示模式</span>
  <span id="bang">图谱模式</span>
</div>
</div>

<script>
const DB = {
  chest:{name:'胸大肌',en:'Pectoralis Major',icon:'🏋️',desc:'胸部最大肌群，由锁骨头和胸骨头构成，负责肩关节水平内收、屈曲与内旋。',vol:'大肌群',rec:'48-72h',ex:[{i:'🏋️',n:'杠铃卧推',t:'复合·主力'},{i:'🕊️',n:'哑铃飞鸟',t:'孤立·拉伸'},{i:'⬆️',n:'双杠臂屈伸',t:'自重·下胸'},{i:'📐',n:'上斜卧推',t:'复合·上胸'}]},
  shoulders:{name:'三角肌',en:'Deltoid',icon:'💪',desc:'三角肌分前中后三束，分别控制肩部前举、外展和后伸，是肩部圆润感的关键肌群。',vol:'中肌群',rec:'48h',ex:[{i:'🏋️',n:'哑铃肩推',t:'复合·整体'},{i:'↔️',n:'侧平举',t:'孤立·中束'},{i:'⬆️',n:'前平举',t:'孤立·前束'},{i:'🔄',n:'俯身飞鸟',t:'孤立·后束'}]},
  biceps:{name:'肱二头肌',en:'Biceps Brachii',icon:'💪',desc:'由长头和短头组成，负责肘关节屈曲与前臂旋后，是上臂最显眼的肌群。',vol:'小肌群',rec:'36-48h',ex:[{i:'💪',n:'杠铃弯举',t:'复合·基础'},{i:'🔄',n:'哑铃交替弯举',t:'孤立·对称'},{i:'🔨',n:'锤式弯举',t:'肱肌·厚度'},{i:'🎯',n:'集中弯举',t:'孤立·顶峰'}]},
  triceps:{name:'肱三头肌',en:'Triceps Brachii',icon:'💪',desc:'由长头、外侧头和内侧头组成，占上臂体积约2/3，是手臂围度的主要贡献者。',vol:'中肌群',rec:'48h',ex:[{i:'🏋️',n:'窄距卧推',t:'复合·整体'},{i:'⬇️',n:'绳索下压',t:'孤立·外侧头'},{i:'💪',n:'颈后臂屈伸',t:'孤立·长头'},{i:'💎',n:'钻石俯卧撑',t:'自重·整体'}]},
  abs:{name:'腹直肌',en:'Rectus Abdominis',icon:'⚡',desc:'腹直肌由腱划分为6~8格，负责脊柱屈曲。腹斜肌协助旋转与侧屈，构成腰腹线条。',vol:'中肌群',rec:'24-48h',ex:[{i:'🌀',n:'卷腹',t:'基础·上腹'},{i:'⬆️',n:'悬垂举腿',t:'核心·下腹'},{i:'📏',n:'平板支撑',t:'等长·稳定'},{i:'🔄',n:'俄罗斯转体',t:'旋转·腹斜肌'}]},
  lats:{name:'背阔肌',en:'Latissimus Dorsi',icon:'🦅',desc:'背阔肌是背部面积最大的肌肉，决定倒三角体型，搭配竖脊肌构成强壮的后背。',vol:'大肌群',rec:'72h',ex:[{i:'⬆️',n:'引体向上',t:'自重·宽背'},{i:'⬇️',n:'高位下拉',t:'复合·宽度'},{i:'🚣',n:'坐姿划船',t:'复合·厚度'},{i:'💪',n:'单臂哑铃划船',t:'单侧·均衡'}]},
  quads:{name:'股四头肌',en:'Quadriceps',icon:'🦵',desc:'股四头肌覆盖大腿前侧，后侧腘绳肌负责膝屈与髋伸，是人体最大的复合肌群。',vol:'大肌群',rec:'72-96h',ex:[{i:'🏋️',n:'深蹲',t:'复合·王者'},{i:'🦵',n:'腿举',t:'复合·大重量'},{i:'🔄',n:'腿弯举',t:'孤立·腘绳肌'},{i:'🚶',n:'弓步行走',t:'功能·单侧'}]},
  glutes:{name:'臀大肌',en:'Gluteus Maximus',icon:'🍑',desc:'臀大肌是人体最大的单块肌肉，负责髋关节伸展，是爆发力与体型美感的核心。',vol:'大肌群',rec:'72h',ex:[{i:'⬆️',n:'臀推',t:'孤立·臀大肌'},{i:'🏋️',n:'罗马尼亚硬拉',t:'复合·拉伸'},{i:'🦀',n:'蚌式开合',t:'激活·臀中肌'},{i:'🦵',n:'保加利亚分腿蹲',t:'单侧·均衡'}]},
  calves:{name:'小腿三头肌',en:'Gastrocnemius',icon:'🦵',desc:'腓肠肌有内外两头，负责踝关节跖屈。比目鱼肌在深层，两者共同构成小腿形态。',vol:'小肌群',rec:'36h',ex:[{i:'⬆️',n:'站姿提踵',t:'腓肠肌·主力'},{i:'🪑',n:'坐姿提踵',t:'比目鱼肌·深层'},{i:'🪢',n:'跳绳',t:'有氧·综合'},{i:'🏃',n:'爆发式提踵',t:'爆发力'}]},
  forearm:{name:'前臂肌群',en:'Forearm Muscles',icon:'✊',desc:'前臂屈肌群负责腕关节屈曲和手指握力，是握力与手腕稳定性的基础。',vol:'小肌群',rec:'36h',ex:[{i:'💪',n:'腕弯举',t:'屈肌·握力'},{i:'⬇️',n:'反握腕弯举',t:'伸肌·力量'},{i:'✊',n:'握力器训练',t:'综合·耐力'},{i:'🏋️',n:'农夫行走',t:'功能·综合'}]}
};

const SEC = ['lats','glutes','quads'];
let curView = 'atlas', curSide = 'front', curG = null;

// Auto side mapping
const FRONT_ONLY = ['chest','biceps','abs'];
const BACK_ONLY  = ['lats','glutes','triceps'];

function setView(v) {
  curView = v;
  ['atlas','heat','cards'].forEach((n,i) => {
    document.querySelectorAll('.vtab')[i].classList.toggle('on', n === v);
  });
  const bview = document.getElementById('bview');
  const cview = document.getElementById('cview');
  if (v === 'cards') {
    bview.style.display = 'none';
    cview.style.display = 'flex';
    renderCards();
    document.getElementById('vlabel').textContent = '卡片图谱';
    document.getElementById('bang').textContent = '卡片模式';
    document.getElementById('botLeft').textContent = '点击卡片查看详情 · 跳转图谱模式查看人体图';
  } else {
    bview.style.display = 'flex';
    cview.style.display = 'none';
    const svg = document.getElementById('bodySvg');
    if (v === 'heat') {
      svg.classList.add('heat');
      document.getElementById('stage').style.background = 'radial-gradient(ellipse 60% 70% at 50% 45%,#080015 0%,#020008 100%)';
      document.getElementById('vlabel').textContent = '热力图谱';
      document.getElementById('bang').textContent = '热力模式';
      document.getElementById('botLeft').textContent = '热力模式 · 点击肌肉查看训练强度';
    } else {
      svg.classList.remove('heat');
      document.getElementById('stage').style.background = '';
      document.getElementById('vlabel').textContent = '交互图谱';
      document.getElementById('bang').textContent = '图谱模式';
      document.getElementById('botLeft').textContent = '点击人体图选择肌群 · 切换正面/背面';
    }
    applyHL(curG);
  }
}

function setSide(s) {
  curSide = s;
  document.getElementById('btnFront').classList.toggle('on', s === 'front');
  document.getElementById('btnBack').classList.toggle('on', s === 'back');
  document.getElementById('frontView').setAttribute('display', s === 'front' ? '' : 'none');
  document.getElementById('backView').setAttribute('display', s === 'back' ? '' : 'none');
  applyHL(curG);
}

function applyHL(g) {
  document.querySelectorAll('.m-muscle').forEach(el => {
    el.classList.remove('hi','dim');
    if (!g) return;
    if (el.getAttribute('data-g') === g) el.classList.add('hi');
    else el.classList.add('dim');
  });
}

window.sel = function(g) {
  curG = g;

  // Update pills
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('on'));
  const pill = document.querySelector('.pill[data-g="' + g + '"]');
  if (pill) pill.classList.add('on');

  // Auto-switch side
  if (BACK_ONLY.includes(g) && curSide === 'front') setSide('back');
  else if (FRONT_ONLY.includes(g) && curSide === 'back') setSide('front');
  else applyHL(g);

  // Update info panel
  const d = DB[g]; if (!d) return;
  const isSec = SEC.includes(g);
  const ac = isSec ? '#7c4dff' : '#ff5722';
  document.getElementById('pinfo').innerHTML = `
    <div class="icard">
      <h3>${d.name}</h3>
      <div class="ien">${d.en}</div>
      <p>${d.desc}</p>
      <div class="istats">
        <div class="ist"><div class="isv" style="color:${ac}">${d.vol}</div><div class="isl">分级</div></div>
        <div class="ist"><div class="isv" style="color:${ac}">${d.rec}</div><div class="isl">恢复</div></div>
      </div>
    </div>
    <div class="ptit" style="margin:4px 0 8px">推荐动作</div>
    ${d.ex.map(e => `<div class="ex"><div class="ei">${e.i}</div><div><div class="en2">${e.n}</div><div class="et">${e.t}</div></div></div>`).join('')}
  `;
  document.getElementById('cta').classList.add('on');
  document.getElementById('glowFloor').style.background = isSec
    ? 'radial-gradient(ellipse,rgba(124,77,255,.15) 0%,transparent 70%)'
    : 'radial-gradient(ellipse,rgba(255,87,34,.12) 0%,transparent 70%)';
};

// SVG click handlers
document.querySelectorAll('.m-muscle').forEach(el => {
  el.addEventListener('click', function() {
    const g = this.getAttribute('data-g');
    if (g) sel(g);
  });
});

function renderCards() {
  const order = ['chest','shoulders','biceps','triceps','abs','lats','quads','glutes','calves','forearm'];
  document.getElementById('cgrid').innerHTML = order.map(g => {
    const d = DB[g];
    const isSec = SEC.includes(g);
    return `
      <div class="mcard ${isSec ? 'sec' : ''}" onclick="sel('${g}'); setView('atlas')">
        <div class="mcard-top">
          <span class="mcard-icon">${d.icon}</span>
          <span class="mcard-tag">${d.vol}</span>
        </div>
        <div class="mcard-name">${d.name}</div>
        <div class="mcard-en">${d.en}</div>
        <div class="mcard-desc">${d.desc.substring(0, 48)}…</div>
        <div class="mcard-stats">
          <div class="mcs"><div class="mcsv">${d.rec}</div><div class="mcsl">恢复时间</div></div>
          <div class="mcs"><div class="mcsv">${d.ex.length}</div><div class="mcsl">训练动作</div></div>
        </div>
        <div class="mcard-exs">
          ${d.ex.map(e => `<div class="mcard-ex"><span>${e.i}</span><span>${e.n}</span></div>`).join('')}
        </div>
      </div>`;
  }).join('');
}

window.go = function() {
  if (curG && DB[curG]) alert('训练计划：训练 ' + DB[curG].name + '\n\n在实际 App 中这里会生成完整训练计划。');
};
</script>
</body>
</html>
