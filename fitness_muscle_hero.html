
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --acc:#e85d2f;--acc2:#7c4dff;--bg:#0b0b12;--bg2:#13131e;--bg3:#1a1a28;
  --t1:#f0ede8;--t2:#8a8898;--bd:rgba(255,255,255,0.07);
  --idle:#1e1e30;--hover:#c94e28;--active:#ff6b3d;--active2:#9c7fff;
}
body{background:transparent;font-family:'Inter',sans-serif}

.wrap{background:var(--bg);border-radius:18px;overflow:hidden;display:flex;flex-direction:column;min-height:720px}

/* Top bar */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--bd);flex-shrink:0}
.logo{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:3px;color:var(--acc)}
.logo span{color:var(--t1)}
.vtoggle{display:flex;background:rgba(255,255,255,0.06);border-radius:30px;padding:3px;gap:2px}
.vtoggle button{background:transparent;border:none;color:var(--t2);font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;padding:6px 18px;border-radius:30px;cursor:pointer;transition:all .2s}
.vtoggle button.on{background:var(--acc);color:#fff}

/* Layout: figure big, panel small */
.body{display:flex;flex:1;overflow:hidden}

/* Figure takes most space */
.fig-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 0;position:relative}
.fig-wrap{position:relative;width:340px;height:580px}
.fig-wrap svg{width:100%;height:100%}

/* Floating label tooltips */
.lbl-group{position:absolute;pointer-events:none;display:flex;align-items:center;gap:6px;opacity:0;transition:opacity .25s}
.lbl-group.show{opacity:1}
.lbl-line{height:1px;background:var(--acc);width:32px;flex-shrink:0}
.lbl-line.rev{order:-1}
.lbl-pill{background:rgba(10,10,20,0.92);border:1px solid var(--acc);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:600;color:var(--acc);white-space:nowrap;letter-spacing:.5px}
.lbl-pill.sec{border-color:var(--acc2);color:var(--acc2)}
.lbl-line.sec{background:var(--acc2)}

/* Right panel — compact info */
.panel{width:200px;flex-shrink:0;border-left:1px solid var(--bd);display:flex;flex-direction:column;padding:18px 14px;gap:12px;overflow-y:auto}
.ptitle{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t2)}

.info-box{background:var(--bg2);border:1px solid var(--bd);border-radius:12px;padding:12px}
.info-box h3{font-size:14px;font-weight:600;color:var(--t1);margin-bottom:3px}
.info-box .en{font-size:10px;color:var(--t2);margin-bottom:8px}
.info-box p{font-size:11px;color:var(--t2);line-height:1.65}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:10px}
.st{background:var(--bg3);border-radius:8px;padding:7px 8px;text-align:center}
.st .v{font-size:15px;font-weight:700;color:var(--acc);line-height:1}
.st .l{font-size:9px;color:var(--t2);margin-top:2px}

.ex-item{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:8px;background:var(--bg2);border:1px solid var(--bd);cursor:pointer;transition:border-color .2s}
.ex-item:hover{border-color:var(--acc)}
.ex-ic{width:24px;height:24px;border-radius:6px;background:rgba(232,93,47,.18);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.ex-nm{font-size:11px;font-weight:500;color:var(--t1)}
.ex-tg{font-size:9px;color:var(--t2)}

.cta{width:100%;padding:10px;border-radius:10px;background:var(--acc);border:none;color:#fff;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:opacity .2s;margin-top:auto}
.cta:hover{opacity:.85}

.empty{text-align:center;padding:30px 10px;color:var(--t2);font-size:11px;line-height:1.8}
.empty .arrow{font-size:28px;margin-bottom:8px;opacity:.4}

/* Muscle SVG */
.m{fill:var(--idle);stroke:rgba(255,255,255,0.06);stroke-width:.6;cursor:pointer;transition:fill .2s,stroke .2s}
.m:hover{fill:var(--hover);stroke:rgba(232,93,47,.4)}
.m.on{fill:var(--active);stroke:rgba(255,107,61,.5)}
.m.on.sec{fill:var(--active2);stroke:rgba(156,127,255,.5)}

/* Bottom strip */
.bot{border-top:1px solid var(--bd);padding:10px 24px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.bot-hint{font-size:10px;color:var(--t2)}
.bot-sel{font-size:11px;font-weight:600;color:var(--acc)}
</style>

  quads:{name:'股四头肌 / 腘绳肌',en:'Quads / Hamstrings',desc:'大腿前后两大肌群，股四头负责膝伸展，腘绳肌负责膝弯曲，是下肢爆发力的核心。',vol:'大肌群',rec:'72-96h',ex:[{i:'🏋️',n:'深蹲',t:'复合'},{i:'🦵',n:'腿举',t:'复合'},{i:'🔄',n:'腿弯举',t:'腘绳肌'},{i:'🚶',n:'弓步行走',t:'功能'}]},
  glutes:{name:'臀大肌',en:'Gluteus Maximus',desc:'人体最大肌肉之一，负责髋关节伸展。强壮臀肌能保护腰椎，提升运动爆发力。',vol:'大肌群',rec:'72h',ex:[{i:'⬆️',n:'臀推',t:'孤立'},{i:'🏋️',n:'硬拉',t:'复合'},{i:'🦀',n:'蚌式开合',t:'激活'},{i:'🦵',n:'保加利亚分腿蹲',t:'单侧'}]},
  calves:{name:'小腿三头肌',en:'Gastrocnemius & Soleus',desc:'由腓肠肌和比目鱼肌组成，负责踝关节跖屈。耐力强，需要高次数、高频训练。',vol:'小肌群',rec:'36h',ex:[{i:'⬆️',n:'站姿提踵',t:'腓肠肌'},{i:'🪑',n:'坐姿提踵',t:'比目鱼肌'},{i:'🪢',n:'跳绳',t:'有氧'}]}
};

let cur=null, view='front';
const sec=['lats','glutes','quads'];

function setV(v){
  view=v;
  document.getElementById('sv-front').style.display=v==='front'?'block':'none';
  document.getElementById('sv-back').style.display=v==='back'?'block':'none';
  document.getElementById('bf').className=v==='front'?'on':'';
  document.getElementById('bb').className=v==='back'?'on':'';
  // Re-apply highlight
  if(cur) applyHL(cur);
}

function applyHL(g){
  document.querySelectorAll('.m').forEach(e=>e.classList.remove('on'));
  document.querySelectorAll('[data-g="'+g+'"]').forEach(e=>{
    e.classList.add('on');
    if(sec.includes(g)) e.classList.add('sec');
  });
}

function sel(g){
  cur=g;
  applyHL(g);
  // Labels
  document.querySelectorAll('.lbl-group').forEach(l=>l.classList.remove('show'));
  const lbl=document.getElementById('lbl-'+g);
  if(lbl) lbl.classList.add('show');

  const d=DB[g]; if(!d) return;
  const isSec=sec.includes(g);
  document.getElementById('pinfo').innerHTML=`
    <div class="info-box">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <h3>${d.name}</h3>
          <div class="en">${d.en}</div>
        </div>
        <span style="font-size:9px;font-weight:700;padding:3px 8px;border-radius:20px;background:${isSec?'rgba(124,77,255,.2)':'rgba(232,93,47,.2)'};color:${isSec?'var(--acc2)':'var(--acc)'};">${isSec?'辅助':'主要'}</span>
      </div>
      <p>${d.desc}</p>
      <div class="stats">
        <div class="st"><div class="v" style="font-size:12px">${d.vol}</div><div class="l">分级</div></div>
        <div class="st"><div class="v" style="font-size:12px">${d.rec}</div><div class="l">恢复</div></div>
      </div>
    </div>`;

  document.getElementById('pex-list').innerHTML=d.ex.map(e=>`
    <div class="ex-item">
      <div class="ex-ic">${e.i}</div>
      <div><div class="ex-nm">${e.n}</div><div class="ex-tg">${e.t}</div></div>
    </div>`).join('');
  document.getElementById('pex').style.display='block';
  document.getElementById('pcta').style.display='block';
  document.getElementById('bot-sel').textContent=d.name+' 已选中';
}

function go(){
  if(cur&&DB[cur]) sendPrompt('帮我制定专注训练'+DB[cur].name+'的完整计划，包含动作、组数、次数、组间休息和训练频率建议');
}
</script>
