
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --acc:#e85d2f;--acc2:#7c4dff;--bg:#09090f;--bg2:#11111c;--bg3:#18182a;
  --t1:#f0ede8;--t2:#7a7888;--bd:rgba(255,255,255,0.07);
}
body{background:transparent;font-family:'Inter',sans-serif}
.shell{background:var(--bg);border-radius:18px;overflow:hidden;display:flex;flex-direction:column;height:720px}

/* TOP BAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 22px;border-bottom:1px solid var(--bd);flex-shrink:0}
.logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;color:var(--acc)}
.logo span{color:var(--t1)}
.hint-bar{font-size:10px;color:var(--t2);display:flex;align-items:center;gap:6px}
.hint-bar span{width:6px;height:6px;border-radius:50%;background:var(--acc);display:inline-block;animation:pulse 1.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* MAIN LAYOUT */
.main{display:flex;flex:1;overflow:hidden}

/* 3D STAGE */
.stage{flex:1;display:flex;align-items:center;justify-content:center;position:relative;cursor:grab;user-select:none;overflow:hidden}
.stage:active{cursor:grabbing}
.stage-bg{position:absolute;inset:0;background:radial-gradient(ellipse 60% 60% at 50% 50%, #1a1030 0%, var(--bg) 70%)}

/* 3D scene */
.scene{position:relative;width:220px;height:520px;transform-style:preserve-3d}

/* Each face */
.face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden}
.face svg{width:100%;height:100%}

/* Rotation angle display */
.angle-ring{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:6px}
.ar-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.15);transition:background .2s}
.ar-dot.on{background:var(--acc)}

/* Drag hint */
.drag-hint{position:absolute;top:16px;left:50%;transform:translateX(-50%);font-size:10px;color:var(--t2);letter-spacing:1px;display:flex;align-items:center;gap:5px;opacity:1;transition:opacity .5s}
.drag-hint svg{width:14px;height:14px;opacity:.6}

/* RIGHT PANEL */
.panel{width:210px;flex-shrink:0;border-left:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden}
.panel-top{padding:16px 14px;border-bottom:1px solid var(--bd);flex-shrink:0}
.ptitle{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t2);margin-bottom:10px}
.muscle-pills{display:flex;flex-wrap:wrap;gap:5px}
.mpill{padding:4px 10px;border-radius:20px;font-size:10px;font-weight:600;border:1px solid var(--bd);color:var(--t2);cursor:pointer;transition:all .2s;letter-spacing:.3px}
.mpill:hover{border-color:var(--acc);color:var(--acc)}
.mpill.on{background:rgba(232,93,47,.15);border-color:var(--acc);color:var(--acc)}
.mpill.on.sec{background:rgba(124,77,255,.15);border-color:var(--acc2);color:var(--acc2)}

.panel-info{flex:1;overflow-y:auto;padding:14px}
.info-card{background:var(--bg2);border:1px solid var(--bd);border-radius:12px;padding:12px;margin-bottom:10px}
.info-card h3{font-size:14px;font-weight:600;color:var(--t1);margin-bottom:2px}
.info-card .en{font-size:10px;color:var(--t2);margin-bottom:8px}
.info-card p{font-size:11px;color:var(--t2);line-height:1.65}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:10px}
.st{background:var(--bg3);border-radius:8px;padding:7px 6px;text-align:center}
.st .v{font-size:12px;font-weight:700;color:var(--acc)}
.st .l{font-size:9px;color:var(--t2);margin-top:2px}

.ex-item{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:8px;background:var(--bg2);border:1px solid var(--bd);margin-bottom:6px;cursor:pointer;transition:border-color .2s}
.ex-item:hover{border-color:var(--acc)}
.ex-ic{width:24px;height:24px;border-radius:6px;background:rgba(232,93,47,.15);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.ex-nm{font-size:11px;font-weight:500;color:var(--t1)}
.ex-tg{font-size:9px;color:var(--t2)}
.empty{text-align:center;padding:40px 10px;color:var(--t2);font-size:11px;line-height:1.9}

/* CTA */
.panel-bot{padding:12px 14px;border-top:1px solid var(--bd);flex-shrink:0}
.cta{width:100%;padding:10px;border-radius:10px;background:var(--acc);border:none;color:#fff;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;opacity:0;pointer-events:none;transition:opacity .3s}
.cta.show{opacity:1;pointer-events:all}
.cta:hover{opacity:.85}

/* BOTTOM */
.botbar{border-top:1px solid var(--bd);padding:10px 22px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.botbar span{font-size:10px;color:var(--t2)}
#bot-angle{font-size:11px;font-weight:600;color:var(--acc)}

/* MUSCLE SVG STYLES */
.m{fill:#1c1c2e;stroke:rgba(255,255,255,0.07);stroke-width:.7;cursor:pointer;transition:fill .18s}
.m:hover,.m.on{fill:#e85d2f;stroke:rgba(255,107,61,.5)}
.m.on.sec{fill:#9c7fff;stroke:rgba(156,127,255,.5)}
.m.sec:hover{fill:#7c4dff}
</style>

// ---- Drag to rotate ----
const stage = document.getElementById('stage');
const faces = ['sv-front','sv-side','sv-back','sv-side2'];
const faceNames = ['正面','左侧','背面','右侧'];
// angles at which each face shows: 0=front, 90=left, 180=back, 270=right
let angle = 0;  // 0-359
let dragging = false, startX = 0, lastAngle = 0;
let curFace = 0;
let hintsHidden = false;

function getFaceIdx(a) {
  const n = ((a % 360) + 360) % 360;
  if (n < 45 || n >= 315) return 0;
  if (n >= 45 && n < 135) return 1;
  if (n >= 135 && n < 225) return 2;
  return 3;
}

function updateFace(a) {
  const n = ((a % 360) + 360) % 360;
  const idx = getFaceIdx(n);
  if (idx !== curFace) {
    document.getElementById(faces[curFace]).style.display = 'none';
    document.getElementById(faces[idx]).style.display = 'block';
    curFace = idx;
    // re-highlight
    if (cur) applyHL(cur);
  }
  // Dots (8 dots = every 45deg)
  const dotIdx = Math.round(n / 45) % 8;
  for (let i = 0; i < 8; i++) {
    document.getElementById('dot' + i).className = 'ar-dot' + (i === dotIdx ? ' on' : '');
  }
  document.getElementById('bot-angle').textContent = faceNames[idx] + ' · ' + Math.round(n) + '°';
  document.getElementById('view-label').textContent = faceNames[idx] + ' ' + Math.round(n) + '°';

  // Mirror effect: flip horizontally when looking from right side
  const scene = document.getElementById('scene3d');
  scene.style.transform = (idx === 3) ? 'scaleX(-1)' : 'scaleX(1)';
}

function onDown(e) {
  dragging = true;
  startX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
  lastAngle = angle;
  if (!hintsHidden) {
    document.getElementById('dhint').style.opacity = '0';
    hintsHidden = true;
  }
}
function onMove(e) {
  if (!dragging) return;
  const x = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
  const dx = x - startX;
  angle = lastAngle + dx * 0.4;
  updateFace(angle);
}
function onUp() { dragging = false; }

stage.addEventListener('mousedown', onDown);
window.addEventListener('mousemove', onMove);
window.addEventListener('mouseup', onUp);
stage.addEventListener('touchstart', onDown, {passive:true});
window.addEventListener('touchmove', onMove, {passive:true});
window.addEventListener('touchend', onUp);

// Auto-rotate hint
let autoTimer = setTimeout(() => {
  if (!hintsHidden) {
    let a = 0;
    const iv = setInterval(() => {
      a += 1.5;
      angle = a;
      updateFace(a);
      if (a >= 45 || dragging) { clearInterval(iv); angle = 0; updateFace(0); }
    }, 16);
  }
}, 1200);

// ---- Muscle selection ----
let cur = null;
const sec = ['lats','glutes','quads'];

function applyHL(g) {
  document.querySelectorAll('.m').forEach(e => e.classList.remove('on', 'sec'));
  document.querySelectorAll('[data-g="' + g + '"]').forEach(e => {
    e.classList.add('on');
    if (sec.includes(g)) e.classList.add('sec');
  });
}

function sel(g) {
  cur = g;
  applyHL(g);
  // Pills
  document.querySelectorAll('.mpill').forEach(p => p.classList.remove('on'));
  const pill = document.querySelector('.mpill[data-g="' + g + '"]');
  if (pill) pill.classList.add('on');

  const d = DB[g]; if (!d) return;
  const isSec = sec.includes(g);
  const ac = isSec ? 'var(--acc2)' : 'var(--acc)';
  const bg = isSec ? 'rgba(124,77,255,.15)' : 'rgba(232,93,47,.15)';
  document.getElementById('pinfo').innerHTML = `
    <div class="info-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <h3>${d.name}</h3>
          <div class="en">${d.en}</div>
        </div>
        <span style="font-size:9px;font-weight:700;padding:3px 8px;border-radius:20px;background:${bg};color:${ac}">${isSec?'辅助':'主要'}</span>
      </div>
      <p>${d.desc}</p>
      <div class="stats">
        <div class="st"><div class="v">${d.vol}</div><div class="l">分级</div></div>
        <div class="st"><div class="v">${d.rec}</div><div class="l">恢复</div></div>
      </div>
    </div>
    <div style="font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t2);margin:8px 0 6px">推荐动作</div>
    ${d.ex.map(e=>`<div class="ex-item"><div class="ex-ic">${e.i}</div><div><div class="ex-nm">${e.n}</div><div class="ex-tg">${e.t}</div></div></div>`).join('')}
  `;
  document.getElementById('pcta').classList.add('show');
}

function go() {
  if (cur && DB[cur]) sendPrompt('帮我制定专注训练' + DB[cur].name + '的完整计划，包含动作、组数、次数和休息时间建议');
}
</script>
