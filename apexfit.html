<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>APEXFIT — 肌肉图谱</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#08080f;font-family:'Inter',sans-serif;overflow:hidden}

:root{
  --acc:#ff5722;--acc2:#7c4dff;--bg:#08080f;--bg2:#0f0f1c;--bg3:#171728;
  --t1:#f5f0ea;--t2:#686680;--bd:rgba(255,255,255,0.07);
  --glow:rgba(255,87,34,0.35);--glow2:rgba(124,77,255,0.35);
}

.app{display:flex;flex-direction:column;height:100vh;background:var(--bg)}

.top{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;border-bottom:1px solid var(--bd);flex-shrink:0;background:rgba(8,8,15,0.95);backdrop-filter:blur(12px);z-index:10}
.logo{font-family:'Bebas Neue',sans-serif;font-size:21px;letter-spacing:3px;color:var(--acc);line-height:1}
.logo em{color:var(--t1);font-style:normal}
.top-hint{font-size:10px;color:var(--t2);display:flex;align-items:center;gap:5px}
.pulse{width:5px;height:5px;border-radius:50%;background:var(--acc);animation:p 1.6s ease-in-out infinite}
@keyframes p{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.7)}}
.angle-badge{font-size:10px;font-weight:600;color:var(--t2);background:var(--bg3);border:1px solid var(--bd);border-radius:20px;padding:3px 10px}

.main{display:flex;flex:1;overflow:hidden}

.stage{flex:1;position:relative;overflow:hidden;background:radial-gradient(ellipse 70% 80% at 50% 45%, #12102a 0%, #08080f 75%)}
.stage-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}
.stage-glow{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:300px;height:80px;background:radial-gradient(ellipse,rgba(255,87,34,.12) 0%,transparent 70%);pointer-events:none;transition:opacity .4s}

.body-stage{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;cursor:grab;touch-action:none}
.body-stage:active{cursor:grabbing}
.body-wrap{position:relative;width:300px;height:580px;transition:transform .05s linear;transform-origin:center center}
.body-wrap svg{position:absolute;top:0;left:0;width:100%;height:100%;overflow:visible}

.m{fill:#1a1a2e;stroke:rgba(255,255,255,0.1);stroke-width:0.8;cursor:pointer;filter:drop-shadow(0 0 0px transparent);transition:fill .25s,filter .25s,stroke .25s}
.m:hover{fill:#cc4422;stroke:rgba(255,120,80,.6);filter:drop-shadow(0 0 6px rgba(255,87,34,.5))}
.m.on{fill:var(--acc);stroke:rgba(255,160,100,.8);filter:drop-shadow(0 0 10px rgba(255,87,34,.7)) drop-shadow(0 0 20px rgba(255,87,34,.3));animation:muscleGlow 1.8s ease-in-out infinite}
.m.on.sec{fill:var(--acc2);stroke:rgba(180,140,255,.8);filter:drop-shadow(0 0 10px rgba(124,77,255,.7)) drop-shadow(0 0 20px rgba(124,77,255,.3));animation:muscleGlow2 1.8s ease-in-out infinite}
@keyframes muscleGlow{0%,100%{filter:drop-shadow(0 0 8px rgba(255,87,34,.6)) drop-shadow(0 0 18px rgba(255,87,34,.25))}50%{filter:drop-shadow(0 0 14px rgba(255,87,34,.9)) drop-shadow(0 0 30px rgba(255,87,34,.45))}}
@keyframes muscleGlow2{0%,100%{filter:drop-shadow(0 0 8px rgba(124,77,255,.6)) drop-shadow(0 0 18px rgba(124,77,255,.25))}50%{filter:drop-shadow(0 0 14px rgba(124,77,255,.9)) drop-shadow(0 0 30px rgba(124,77,255,.45))}}

.skin{fill:#141428;stroke:rgba(255,255,255,.08);stroke-width:.5}

.tag{position:absolute;pointer-events:none;display:flex;align-items:center;gap:6px;opacity:0;transition:opacity .3s;white-space:nowrap;z-index:5}
.tag.show{opacity:1}
.tag-line{height:1px;width:28px;background:var(--acc)}
.tag-pill{background:rgba(8,8,15,.9);border:1px solid var(--acc);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:600;color:var(--acc);letter-spacing:.5px}
.tag.sec .tag-line{background:var(--acc2)}
.tag.sec .tag-pill{border-color:var(--acc2);color:var(--acc2)}
.tag.right .tag-line{order:-1}

.view-arc{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);display:flex;gap:5px;align-items:center}
.va-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.15);transition:all .25s}
.va-dot.on{background:var(--acc);box-shadow:0 0 6px var(--acc)}

.drag-hint{position:absolute;top:18px;left:50%;transform:translateX(-50%);font-size:10px;color:var(--t2);letter-spacing:1px;display:flex;align-items:center;gap:6px;transition:opacity .5s;pointer-events:none}
.drag-hint-icon{width:28px;height:18px;border:1px solid var(--t2);border-radius:10px;position:relative;display:flex;align-items:center;justify-content:center;opacity:.6}
.drag-hint-icon::after{content:'';width:5px;height:5px;border-radius:50%;background:var(--t2);animation:dragSlide 1.4s ease-in-out infinite}
@keyframes dragSlide{0%,100%{transform:translateX(-6px)}50%{transform:translateX(6px)}}

.panel{width:220px;flex-shrink:0;border-left:1px solid var(--bd);display:flex;flex-direction:column;background:rgba(8,8,15,.95)}
.panel-sec{padding:14px;border-bottom:1px solid var(--bd);flex-shrink:0}
.ptitle{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t2);margin-bottom:9px}
.pills{display:flex;flex-wrap:wrap;gap:5px}
.pill{padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600;border:1px solid var(--bd);color:var(--t2);cursor:pointer;transition:all .2s}
.pill:hover{border-color:var(--acc);color:var(--acc)}
.pill.on{background:rgba(255,87,34,.15);border-color:var(--acc);color:var(--acc)}
.pill.on.sec{background:rgba(124,77,255,.15);border-color:var(--acc2);color:var(--acc2)}

.panel-info{flex:1;overflow-y:auto;padding:13px;scrollbar-width:thin;scrollbar-color:var(--bd) transparent}
.icard{background:var(--bg2);border:1px solid var(--bd);border-radius:12px;padding:13px;margin-bottom:10px}
.icard h3{font-size:15px;font-weight:600;color:var(--t1);margin-bottom:2px}
.icard .en{font-size:10px;color:var(--t2);margin-bottom:9px}
.icard p{font-size:11px;color:var(--t2);line-height:1.7}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:10px}
.st{background:var(--bg3);border-radius:8px;padding:8px;text-align:center}
.sv{font-size:12px;font-weight:700;color:var(--acc);line-height:1}
.sl{font-size:9px;color:var(--t2);margin-top:2px}
.ex{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:9px;background:var(--bg2);border:1px solid var(--bd);margin-bottom:6px;cursor:pointer;transition:border-color .2s,transform .1s}
.ex:hover{border-color:var(--acc);transform:translateX(2px)}
.ei{width:26px;height:26px;border-radius:7px;background:rgba(255,87,34,.13);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.en2{font-size:11px;font-weight:500;color:var(--t1)}
.et{font-size:9px;color:var(--t2)}
.empty{text-align:center;padding:40px 12px;color:var(--t2);font-size:11px;line-height:2}
.empty-icon{font-size:32px;opacity:.3;margin-bottom:8px}
.ptitle-sec{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t2);margin:4px 0 8px}

.pbot{padding:12px;border-top:1px solid var(--bd);flex-shrink:0}
.cta{width:100%;padding:11px;border-radius:11px;background:linear-gradient(135deg,#ff5722,#e64a19);border:none;color:#fff;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;opacity:0;pointer-events:none;transition:opacity .3s,transform .15s;box-shadow:0 4px 20px rgba(255,87,34,.25)}
.cta.on{opacity:1;pointer-events:all}
.cta:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(255,87,34,.4)}

.bot{border-top:1px solid var(--bd);padding:8px 20px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;background:rgba(8,8,15,.95)}
.bot span{font-size:10px;color:var(--t2)}
#bang{font-size:10px;font-weight:600;color:var(--acc)}
</style>
</head>

            <path class="m" data-g="calves" d="M90 562 C82 580 80 604 82 622 C84 636 90 644 100 646 C110 646 118 636 120 620 C122 604 118 580 110 562 Z" onclick="sel('calves')"/>
            <path class="m" data-g="calves" d="M134 562 C126 580 124 604 126 620 C128 636 136 646 148 646 C160 646 166 634 164 618 C162 602 156 578 148 562 Z" onclick="sel('calves')"/>

          <!-- Tags -->
          <div class="tag" id="tag-chest" style="top:130px;left:-10px"><div class="tag-pill">胸大肌</div><div class="tag-line"></div></div>
          <div class="tag right" id="tag-shoulders" style="top:90px;right:-10px"><div class="tag-line"></div><div class="tag-pill">三角肌</div></div>
          <div class="tag" id="tag-biceps" style="top:195px;left:-10px"><div class="tag-pill">肱二头肌</div><div class="tag-line"></div></div>
          <div class="tag right" id="tag-triceps" style="top:205px;right:-10px"><div class="tag-line"></div><div class="tag-pill">肱三头肌</div></div>
          <div class="tag" id="tag-abs" style="top:245px;left:-10px"><div class="tag-pill">腹直肌</div><div class="tag-line"></div></div>
          <div class="tag right" id="tag-lats" style="top:175px;right:-10px"><div class="tag-line"></div><div class="tag-pill sec">背阔肌</div></div>

    <div class="panel">
      <div class="panel-sec">
        <div class="ptitle">肌群</div>
        <div class="pills">
          <div class="pill" data-g="chest" onclick="sel('chest')">胸肌</div>
          <div class="pill" data-g="shoulders" onclick="sel('shoulders')">三角肌</div>
          <div class="pill" data-g="biceps" onclick="sel('biceps')">二头肌</div>
          <div class="pill" data-g="triceps" onclick="sel('triceps')">三头肌</div>
          <div class="pill" data-g="abs" onclick="sel('abs')">腹肌</div>
          <div class="pill sec" data-g="lats" onclick="sel('lats')">背阔肌</div>
          <div class="pill sec" data-g="quads" onclick="sel('quads')">腿部</div>
          <div class="pill sec" data-g="glutes" onclick="sel('glutes')">臀肌</div>
          <div class="pill" data-g="calves" onclick="sel('calves')">小腿</div>
        </div>
      </div>
      <div class="panel-info" id="pinfo">
        <div class="empty">
          <div class="empty-icon">⟳</div>
          拖拽旋转人体<br>点击任意肌肉部位<br>查看详情与训练动作
        </div>
      </div>
      <div class="pbot"><button class="cta" id="cta" onclick="alert('在实际App中此处生成训练计划')">生成训练计划 →</button></div>

</div>

<script>
const DB={
  chest:{name:'胸大肌',en:'Pectoralis Major',desc:'胸部最大肌群，由胸骨头与锁骨头组成，负责手臂水平内收与旋转。强壮的胸肌是上肢推力的核心来源。',vol:'大肌群',rec:'48-72h',ex:[{i:'🏋️',n:'杠铃卧推',t:'复合·主力'},{i:'🕊️',n:'哑铃飞鸟',t:'孤立·拉伸'},{i:'⬆️',n:'双杠臂屈伸',t:'自重·下胸'},{i:'📐',n:'上斜卧推',t:'复合·上胸'}]},
  shoulders:{name:'三角肌 + 斜方肌',en:'Deltoid & Trapezius',desc:'三角肌分前中后三束，斜方肌连接颈背与肩部。均衡训练打造宽阔圆润的肩型，是倒三角身材的关键。',vol:'中肌群',rec:'48h',ex:[{i:'🏋️',n:'哑铃肩推',t:'复合·整体'},{i:'↔️',n:'侧平举',t:'孤立·中束'},{i:'⬆️',n:'前平举',t:'孤立·前束'},{i:'🔄',n:'俯身飞鸟',t:'孤立·后束'}]},
  biceps:{name:'肱二头肌',en:'Biceps Brachii',desc:'由长头短头组成，负责肘关节屈曲与前臂旋后。是展示手臂围度最直观的肌肉，峰值形态依赖长头。',vol:'小肌群',rec:'36-48h',ex:[{i:'💪',n:'杠铃弯举',t:'复合·基础'},{i:'🔄',n:'哑铃交替弯举',t:'孤立·对称'},{i:'🔨',n:'锤式弯举',t:'肱肌·厚度'},{i:'🎯',n:'集中弯举',t:'孤立·顶峰'}]},
  triceps:{name:'肱三头肌',en:'Triceps Brachii',desc:'占上臂体积约2/3，由长头、外侧头、内侧头组成。是手臂最大肌群，决定手臂整体围度的核心。',vol:'中肌群',rec:'48h',ex:[{i:'🏋️',n:'窄距卧推',t:'复合·整体'},{i:'⬇️',n:'绳索下压',t:'孤立·外侧头'},{i:'💪',n:'颈后臂屈伸',t:'孤立·长头'},{i:'💎',n:'钻石俯卧撑',t:'自重·整体'}]},
  abs:{name:'腹直肌 + 腹斜肌',en:'Abs & Obliques',desc:'腹直肌形成六块腹肌视觉效果，腹外斜肌构建腰部线条。体脂率低于15%才能显现清晰轮廓。',vol:'中肌群',rec:'24-48h',ex:[{i:'🌀',n:'卷腹',t:'基础·上腹'},{i:'⬆️',n:'悬垂举腿',t:'核心·下腹'},{i:'📏',n:'平板支撑',t:'等长·稳定'},{i:'🔄',n:'俄罗斯转体',t:'旋转·腹斜肌'}]},
  lats:{name:'背阔肌 + 竖脊肌',en:'Latissimus Dorsi & Erectors',desc:'背阔肌是背部最宽大的肌肉，形成倒三角体型。竖脊肌沿脊柱分布，负责脊柱伸展与稳定。',vol:'大肌群',rec:'72h',ex:[{i:'⬆️',n:'引体向上',t:'自重·宽背'},{i:'⬇️',n:'高位下拉',t:'复合·宽度'},{i:'🚣',n:'坐姿划船',t:'复合·厚度'},{i:'💪',n:'单臂哑铃划船',t:'单侧·均衡'}]},
  quads:{name:'股四头肌 / 腘绳肌',en:'Quadriceps & Hamstrings',desc:'大腿前侧股四头肌（四个头）负责膝关节伸展，后侧腘绳肌负责屈膝与髋伸展，是下肢爆发力核心。',vol:'大肌群',rec:'72-96h',ex:[{i:'🏋️',n:'深蹲',t:'复合·王者'},{i:'🦵',n:'腿举',t:'复合·大重量'},{i:'🔄',n:'腿弯举',t:'孤立·腘绳肌'},{i:'🚶',n:'弓步行走',t:'功能·单侧'}]},
  glutes:{name:'臀大肌 + 臀中肌',en:'Gluteus Maximus & Medius',desc:'臀大肌是人体最大的单块肌肉，负责髋关节伸展。臀中肌控制髋部外展，共同保护腰椎与膝关节。',vol:'大肌群',rec:'72h',ex:[{i:'⬆️',n:'臀推',t:'孤立·臀大肌'},{i:'🏋️',n:'罗马尼亚硬拉',t:'复合·拉伸'},{i:'🦀',n:'蚌式开合',t:'激活·臀中肌'},{i:'🦵',n:'保加利亚分腿蹲',t:'单侧·均衡'}]},
  calves:{name:'小腿三头肌',en:'Gastrocnemius & Soleus',desc:'腓肠肌（双头）与比目鱼肌共同组成小腿三头肌。腓肠肌在膝伸直时发力更强，比目鱼肌则在弯膝时为主力。',vol:'小肌群',rec:'36h',ex:[{i:'⬆️',n:'站姿提踵',t:'腓肠肌·主力'},{i:'🪑',n:'坐姿提踵',t:'比目鱼肌·深层'},{i:'🪢',n:'跳绳',t:'有氧·综合'},{i:'🏃',n:'爆发式提踵',t:'爆发力·速度'}]}
};

const SEC=['lats','glutes','quads'];
let curG=null,angle=0,isDrag=false,startX=0,lastAngle=0;
let hintHidden=false,isFront=true;

function updateView(){
  const norm=((angle%360)+360)%360;
  const front=(norm<90||norm>=270);
  if(front!==isFront){
    isFront=front;
    document.getElementById('svFront').style.display=front?'block':'none';
    document.getElementById('svBack').style.display=front?'none':'block';
    if(curG) applyHL(curG);
    updateTags();
  }
  const t=norm<180?norm:360-norm;
  const scaleX=Math.cos((t/180)*Math.PI*0.5);
  const skewY=(Math.sin((t/180)*Math.PI)*18*0.3);
  document.getElementById('bodyWrap').style.transform=`scaleX(${Math.max(0.15,scaleX)}) skewY(${skewY}deg)`;
  const lbl=norm<45||norm>=315?'正面':norm<135?'右侧':norm<225?'背面':'左侧';
  document.getElementById('vlabel').textContent=lbl+' '+Math.round(norm)+'°';
  document.getElementById('bang').textContent=lbl+' · '+Math.round(norm)+'°';
  const di=Math.round(norm/45)%8;
  for(let i=0;i<8;i++) document.getElementById('d'+i).className='va-dot'+(i===di?' on':'');
}

function updateTags(){
  document.querySelectorAll('.tag').forEach(t=>t.classList.remove('show'));
  if(!curG) return;
  const backOnly=['lats','glutes'];
  const frontOnly=['chest','abs','biceps','quads'];
  if(backOnly.includes(curG)&&!isFront) document.getElementById('tag-'+curG)?.classList.add('show');
  else if(frontOnly.includes(curG)&&isFront) document.getElementById('tag-'+curG)?.classList.add('show');
  else if(['shoulders','triceps','calves'].includes(curG)) document.getElementById('tag-'+curG)?.classList.add('show');
}

const stage=document.getElementById('bodyStage');
function onDown(e){isDrag=true;startX=e.touches?e.touches[0].clientX:e.clientX;lastAngle=angle;if(!hintHidden){document.getElementById('dhint').style.opacity='0';hintHidden=true}}
function onMove(e){if(!isDrag)return;const x=e.touches?e.touches[0].clientX:e.clientX;angle=lastAngle+(x-startX)*0.45;updateView()}
function onUp(){isDrag=false}
stage.addEventListener('mousedown',onDown);
window.addEventListener('mousemove',onMove);
window.addEventListener('mouseup',onUp);
stage.addEventListener('touchstart',onDown,{passive:true});
window.addEventListener('touchmove',onMove,{passive:true});
window.addEventListener('touchend',onUp);
stage.addEventListener('wheel',e=>{const s=Math.max(0.7,Math.min(1.5,parseFloat(document.getElementById('bodyWrap').style.transform.match(/scaleX\(([^)]+)\)/)?.[1]||1)-e.deltaY*0.001));updateView();},{passive:true});

setTimeout(()=>{if(hintHidden)return;let a=0;const iv=setInterval(()=>{a+=1.2;angle=a;updateView();if(a>=50){clearInterval(iv);angle=0;updateView()}},16);},1000);

function applyHL(g){
  document.querySelectorAll('.m').forEach(m=>{m.classList.remove('on','sec')});
  document.querySelectorAll('[data-g="'+g+'"]').forEach(m=>{m.classList.add('on');if(SEC.includes(g))m.classList.add('sec')});
}

function sel(g){
  curG=g;applyHL(g);
  document.querySelectorAll('.pill').forEach(p=>p.classList.remove('on'));
  const pill=document.querySelector('.pill[data-g="'+g+'"]');
  if(pill)pill.classList.add('on');
  updateTags();
  const d=DB[g];if(!d)return;
  const isSec=SEC.includes(g);
  const ac=isSec?'#7c4dff':'#ff5722';
  const bg=isSec?'rgba(124,77,255,.15)':'rgba(255,87,34,.15)';
  document.getElementById('pinfo').innerHTML=`
    <div class="icard">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:2px">
        <div><h3>${d.name}</h3><div class="en" style="font-size:10px;color:var(--t2);margin-bottom:8px">${d.en}</div></div>
        <span style="font-size:9px;font-weight:700;padding:3px 8px;border-radius:20px;background:${bg};color:${ac};white-space:nowrap;flex-shrink:0;margin-left:8px">${isSec?'背面':'正面'}</span>
      </div>
      <p>${d.desc}</p>
      <div class="stats">
        <div class="st"><div class="sv">${d.vol}</div><div class="sl">体积分级</div></div>
        <div class="st"><div class="sv">${d.rec}</div><div class="sl">恢复周期</div></div>
      </div>
    </div>
    <div class="ptitle-sec" style="font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t2);margin:2px 0 8px">推荐训练动作</div>
    ${d.ex.map(e=>`<div class="ex"><div class="ei">${e.i}</div><div><div class="en2">${e.n}</div><div class="et">${e.t}</div></div></div>`).join('')}`;
  document.getElementById('cta').classList.add('on');
  updateView();
}
</script>
